<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Openboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="top-navbar">
    <span class="navbar-logo">Openboard</span>
    <select class="project-selector" id="project-selector">
      <option value="">All projects</option>
    </select>
    <div class="navbar-tabs">
      <button class="nav-btn active" data-view="tasks">Tasks</button>
      <button class="nav-btn" data-view="todos">Todos</button>
      <button class="nav-btn" data-view="devlog">Dev Log</button>
    </div>
    <button class="btn-icon" id="new-project-btn" title="New project">+</button>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="task-filters">
      <div class="filter-section">
        <h3>Status</h3>
        <button class="filter-btn active" data-filter="status" data-value="">All</button>
        <button class="filter-btn" data-filter="status" data-value="todo">To Do</button>
        <button class="filter-btn" data-filter="status" data-value="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="status" data-value="done">Done</button>
      </div>

      <div class="filter-section">
        <h3>Assignee</h3>
        <button class="filter-btn active" data-filter="assignee" data-value="">All</button>
        <button class="filter-btn" data-filter="assignee" data-value="TARS">TARS</button>
        <button class="filter-btn" data-filter="assignee" data-value="Erik">Erik</button>
        <button class="filter-btn" data-filter="assignee" data-value="Brock">Brock</button>
        <button class="filter-btn" data-filter="assignee" data-value="Adam">Adam</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="view-title">All Tasks</h2>
        <button class="btn btn-primary" id="new-task-btn">+ New Task</button>
      </header>

      <div class="task-grid" id="task-grid"></div>

      <div class="todos-panel" id="todos-panel" style="display:none"></div>

      <div class="devlog-panel" id="devlog-panel" style="display:none">
        <form class="devlog-form" id="devlog-form">
          <div class="form-row">
            <div class="form-group">
              <label for="devlog-agent">Agent</label>
              <select id="devlog-agent">
                <option value="Erik">Erik</option>
                <option value="Brock">Brock</option>
                <option value="Tars">Tars</option>
              </select>
            </div>
            <div class="form-group">
              <label for="devlog-title">Title *</label>
              <input type="text" id="devlog-title" required placeholder="One-line summary">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="devlog-branch">Branch</label>
              <input type="text" id="devlog-branch" placeholder="e.g. feature/foo">
            </div>
            <div class="form-group">
              <label for="devlog-pr">PR / Commit URL</label>
              <input type="text" id="devlog-pr" placeholder="https://github.com/...">
            </div>
          </div>
          <div class="form-group">
            <label for="devlog-notes">Notes</label>
            <textarea id="devlog-notes" rows="2" placeholder="Optional details"></textarea>
          </div>
          <div class="form-actions-right">
            <button type="submit" class="btn btn-primary">+ Add Entry</button>
          </div>
        </form>

        <div class="devlog-timeline" id="devlog-timeline"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Task</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <!-- Tracks which todo is being converted into a task -->
        <input type="hidden" id="converting-todo-id">
        <div class="form-group">
          <label for="task-title">Title *</label>
          <input type="text" id="task-title" required placeholder="Task title">
        </div>
        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" rows="3" placeholder="Description"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-status">Status</label>
            <select id="task-status">
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-assignee">Assignee</label>
            <select id="task-assignee">
              <option value="">Unassigned</option>
              <option value="TARS">TARS</option>
              <option value="Erik">Erik</option>
              <option value="Brock">Brock</option>
              <option value="Adam">Adam</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-project">Project</label>
            <select id="task-project">
              <option value="">No project</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="delete-task-btn" style="display:none">Delete</button>
          <div class="form-actions-right">
            <button type="button" class="btn" id="cancel-btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal-overlay" id="project-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>New Project</h3>
        <button class="modal-close" id="project-modal-close">&times;</button>
      </div>
      <form id="project-form">
        <div class="form-group">
          <label for="project-name">Project name *</label>
          <input type="text" id="project-name" required placeholder="Project name">
        </div>
        <div class="form-group">
          <label for="project-desc">Description</label>
          <textarea id="project-desc" rows="3" placeholder="Optional description"></textarea>
        </div>
        <div class="form-actions">
          <div class="form-actions-right">
            <button type="button" class="btn" id="project-cancel-btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Create</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
